<!DOCTYPE html>
<html>
<head>
    <title>Cyber Information Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <div class="navbar">
        <h1>SkyView Cyber Info</h1>
        <nav>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</nav>
    </div>
</header>

<main>
    <section class="intro">
        <h2>Stay Safe Online</h2>
        <p>Learn essential cybersecurity tips and protect yourself from digital threats.</p>
    </section>

    <section class="topics">
        {% for topic in topics %}
        <div class="card">
            <img src="{{ url_for('static', filename='images/' + topic.img) }}" alt="{{ topic.title }}">
            <h3>{{ topic.title }}</h3>
            <p>{{ topic.desc }}</p>
        </div>
        {% endfor %}
    </section>
</main>

<footer>
    <p>© 2026 Cyber Info Page | Rishitha Sri Valluru</p>
</footer>

</body>
</html>
